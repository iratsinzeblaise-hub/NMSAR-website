<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership - NMSAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .hero { 
            background: linear-gradient(rgba(0, 40, 85, 0.75), rgba(0, 40, 85, 0.80)), 
                        url('membership-bg.jpg') center/cover no-repeat fixed;
            min-height: 65vh;
        }
    </style>
</head>
<body class="font-sans">

    <!-- Navigation -->
    <nav class="bg-blue-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="NMSAR Logo" class="h-14 w-auto object-contain">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">NMSAR</h1>
                    <p class="text-xs -mt-1 opacity-90">Nurses & Midwives Students' Association of Rwanda</p>
                </div>
            </div>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="index.html" class="hover:text-blue-200">Home</a>
                <a href="about.html" class="hover:text-blue-200">About Us</a>
                <a href="committees.html" class="hover:text-blue-200">Committees</a>
                <a href="activities.html" class="hover:text-blue-200">Activities</a>
                <a href="events.html" class="hover:text-blue-200">Events</a>
                <a href="#" class="text-blue-200 font-semibold">Membership</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero text-white flex items-center">
        <div class="max-w-5xl mx-auto text-center px-6">
            <h1 class="text-5xl md:text-6xl font-bold mb-6">Become a Member</h1>
            <p class="text-2xl">Join the largest network of Nursing and Midwifery Students in Rwanda</p>
        </div>
    </section>

    <!-- Membership Form -->
    <section class="py-16 bg-gray-50">
        <div class="max-w-3xl mx-auto px-6">
            <div class="bg-white rounded-3xl shadow-2xl p-10 md:p-12">

                <form action="#" method="POST" class="space-y-8">
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Full Name <span class="text-red-500">*</span></label>
                            <input type="text" required 
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Registration Number <span class="text-red-500">*</span></label>
                            <input type="text" required 
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Email Address <span class="text-red-500">*</span></label>
                            <input type="email" required 
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Phone Number <span class="text-red-500">*</span></label>
                            <input type="tel" required 
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Institution / University <span class="text-red-500">*</span></label>
                            <input type="text" required placeholder="e.g. University of Rwanda"
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Campus</label>
                            <input type="text" placeholder="e.g. Remera, Huye"
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Program <span class="text-red-500">*</span></label>
                            <select required class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                                <option value="">Select Program</option>
                                <option value="Nursing">Nursing</option>
                                <option value="Midwifery">Midwifery</option>
                                <option value="Nursing & Midwifery">Nursing & Midwifery</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Year of Study <span class="text-red-500">*</span></label>
                            <select required class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                                <option value="">Select Year</option>
                                <option value="1">Year 1</option>
                                <option value="2">Year 2</option>
                                <option value="3">Year 3</option>
                                <option value="4">Year 4</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Why do you want to join NMSAR? (Optional)</label>
                        <textarea rows="4" 
                                  class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500"></textarea>
                    </div>

                    <div class="pt-6">
                        <button type="submit" 
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-6 rounded-3xl text-xl transition">
                            Submit My Membership Application
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-blue-950 text-white py-12 text-center">
        <p class="text-lg">© 2026 NMSAR - Nurses and Midwives Students' Association of Rwanda</p>
    </footer>
</body>
</html>
